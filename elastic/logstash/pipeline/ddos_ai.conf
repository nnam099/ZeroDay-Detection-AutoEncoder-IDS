# ══════════════════════════════════════════════════════════════════════════════
# LOGSTASH PIPELINE — DDoS Detection with AI Integration
# File: logstash/pipeline/ddos_ai.conf
#
# Luồng xử lý:
#   Input (network logs / CSV / filebeat)
#     → Filter (parse + normalize + gom 16 flows + AI call)
#       → Output (Elasticsearch index)
# ══════════════════════════════════════════════════════════════════════════════

input {
  # ── Option 1: Nhận từ Filebeat (Production) ──────────────────────────────
  beats {
    port => 5044
    type => "network_flow"
  }

  # ── Option 2: Đọc trực tiếp CSV CIC-IDS2017 (Development/Testing) ────────
  # file {
  #   path => "/data/cicids2017/*.csv"
  #   start_position => "beginning"
  #   sincedb_path => "/dev/null"
  #   type => "cicids2017_csv"
  #   codec => plain { charset => "UTF-8" }
  # }
}


# ══════════════════════════════════════════════════════════════════════════════
filter {

  # ── 1. Parse CSV Header (chỉ dùng khi đọc CSV trực tiếp) ─────────────────
  if [type] == "cicids2017_csv" {
    csv {
      separator => ","
      skip_header => true
      columns => [
        "Destination Port", "Flow Duration", "Total Fwd Packets",
        "Total Backward Packets", "Total Length of Fwd Packets",
        "Total Length of Bwd Packets", "Fwd Packet Length Max",
        "Fwd Packet Length Min", "Fwd Packet Length Mean",
        "Fwd Packet Length Std", "Bwd Packet Length Max",
        "Bwd Packet Length Min", "Bwd Packet Length Mean",
        "Bwd Packet Length Std", "Flow Bytes/s", "Flow Packets/s",
        "Flow IAT Mean", "Flow IAT Std", "Flow IAT Max", "Flow IAT Min",
        "Fwd IAT Total", "Fwd IAT Mean", "Fwd IAT Std", "Fwd IAT Max",
        "Fwd IAT Min", "Bwd IAT Total", "Bwd IAT Mean", "Bwd IAT Std",
        "Bwd IAT Max", "Bwd IAT Min", "Fwd PSH Flags", "Bwd PSH Flags",
        "Fwd URG Flags", "Bwd URG Flags", "Fwd Header Length",
        "Bwd Header Length", "Fwd Packets/s", "Bwd Packets/s",
        "Min Packet Length", "Max Packet Length", "Packet Length Mean",
        "Packet Length Std", "Packet Length Variance", "FIN Flag Count",
        "SYN Flag Count", "RST Flag Count", "PSH Flag Count",
        "ACK Flag Count", "URG Flag Count", "CWE Flag Count",
        "ECE Flag Count", "Down/Up Ratio", "Average Packet Size",
        "Avg Fwd Segment Size", "Avg Bwd Segment Size",
        "Fwd Header Length1", "Fwd Avg Bytes/Bulk",
        "Fwd Avg Packets/Bulk", "Fwd Avg Bulk Rate",
        "Bwd Avg Bytes/Bulk", "Bwd Avg Packets/Bulk",
        "Bwd Avg Bulk Rate", "Subflow Fwd Packets",
        "Subflow Fwd Bytes", "Subflow Bwd Packets",
        "Subflow Bwd Bytes", "Init_Win_bytes_forward",
        "Init_Win_bytes_backward", "act_data_pkt_fwd",
        "min_seg_size_forward", "Active Mean", "Active Std",
        "Active Max", "Active Min", "Idle Mean", "Idle Std",
        "Idle Max", "Idle Min", "Label"
      ]
    }
    # Thêm source_ip giả lập (với CSV không có IP thật)
    mutate {
      add_field => { "source_ip" => "192.168.%{[Destination Port]}0.1" }
      add_field => { "flow_id"   => "%{[@timestamp]}_%{[Destination Port]}" }
    }
  }

  # ── 2. Convert kiểu số ─────────────────────────────────────────────────────
  mutate {
    convert => {
      "Destination Port"        => "float"
      "Flow Duration"           => "float"
      "Total Fwd Packets"       => "float"
      "Total Backward Packets"  => "float"
      "Flow Bytes/s"            => "float"
      "Flow Packets/s"          => "float"
      "Fwd IAT Mean"            => "float"
      "Packet Length Mean"      => "float"
      "SYN Flag Count"          => "float"
      "ACK Flag Count"          => "float"
      "Init_Win_bytes_forward"  => "float"
      "Active Mean"             => "float"
      "Idle Mean"               => "float"
      "Bwd Packet Length Std"   => "float"
    }
  }

  # ── 3. Xử lý giá trị Infinity / NaN ──────────────────────────────────────
  ruby {
    code => '
      fields = [
        "Destination Port", "Flow Duration", "Total Fwd Packets",
        "Total Backward Packets", "Flow Bytes/s", "Flow Packets/s",
        "Fwd IAT Mean", "Packet Length Mean", "SYN Flag Count",
        "ACK Flag Count", "Init_Win_bytes_forward", "Active Mean",
        "Idle Mean", "Bwd Packet Length Std"
      ]
      fields.each do |f|
        val = event.get(f)
        if val.nil? || val.infinite? || val.nan? rescue false
          event.set(f, 0.0)
        end
      end
    '
  }

  # ── 4. Gọi AI Inference Server ─────────────────────────────────────────────
  # Gom 16 flows theo source_ip rồi mới gửi (streaming mode)
  http {
    url => "http://ai_inference:8000/predict/stream"
    verb => "POST"
    headers => { "Content-Type" => "application/json" }
    body_format => "json"
    body => {
      "flow_id"                 => "%{flow_id}"
      "source_ip"               => "%{source_ip}"
      "destination_port"        => "%{[Destination Port]}"
      "flow_duration"           => "%{[Flow Duration]}"
      "total_fwd_packets"       => "%{[Total Fwd Packets]}"
      "total_backward_packets"  => "%{[Total Backward Packets]}"
      "flow_bytes_s"            => "%{[Flow Bytes/s]}"
      "flow_packets_s"          => "%{[Flow Packets/s]}"
      "fwd_iat_mean"            => "%{[Fwd IAT Mean]}"
      "packet_length_mean"      => "%{[Packet Length Mean]}"
      "syn_flag_count"          => "%{[SYN Flag Count]}"
      "ack_flag_count"          => "%{[ACK Flag Count]}"
      "init_win_bytes_forward"  => "%{[Init_Win_bytes_forward]}"
      "active_mean"             => "%{[Active Mean]}"
      "idle_mean"               => "%{[Idle Mean]}"
      "bwd_packet_length_std"   => "%{[Bwd Packet Length Std]}"
    }
    target_body => "ai_response"
    # Nếu AI server chưa trả kết quả (đang buffer), vẫn index với status=buffering
    socket_timeout => 2
    request_timeout => 3
  }

  # ── 5. Trích xuất kết quả AI vào các field riêng ──────────────────────────
  if [ai_response] {
    mutate {
      add_field => {
        "ai_label"       => "%{[ai_response][label]}"
        "ai_probability" => "%{[ai_response][probability]}"
        "ai_tier"        => "%{[ai_response][tier]}"
        "ai_confidence"  => "%{[ai_response][confidence]}"
        "ai_status"      => "%{[ai_response][status]}"
        "ai_action"      => "%{[ai_response][action]}"
        "ai_latency_ms"  => "%{[ai_response][latency_ms]}"
      }
      convert => {
        "ai_probability" => "float"
        "ai_latency_ms"  => "float"
      }
    }
  }

  # ── 6. Thêm severity tag ──────────────────────────────────────────────────
  if [ai_tier] == "BLOCK" {
    mutate { add_tag => ["ddos_attack", "severity_critical"] }
  } else if [ai_tier] == "CAPTCHA" {
    mutate { add_tag => ["suspicious", "severity_medium"] }
  } else {
    mutate { add_tag => ["benign", "severity_info"] }
  }

  # ── 7. Timestamp chuẩn hóa ────────────────────────────────────────────────
  if ![timestamp] {
    ruby { code => 'event.set("timestamp", Time.now.utc.iso8601(3))' }
  }
}


# ══════════════════════════════════════════════════════════════════════════════
output {

  # ── A. Index tất cả vào Elasticsearch ────────────────────────────────────
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "ddos-detection-%{+YYYY.MM.dd}"
    # Dùng ILM để tự xóa index cũ sau 30 ngày
    ilm_enabled     => true
    ilm_rollover_alias => "ddos-detection"
    ilm_policy      => "ddos-ilm-policy"
  }

  # ── B. Alert riêng: Khi phát hiện tấn công (tier=BLOCK) ──────────────────
  if "ddos_attack" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "ddos-alerts-%{+YYYY.MM.dd}"
    }

    # Optional: Webhook alert (Slack, Teams, PagerDuty)
    # http {
    #   url => "https://hooks.slack.com/services/YOUR_WEBHOOK"
    #   verb => "POST"
    #   body_format => "json"
    #   body => {
    #     "text" => "🚨 DDoS Attack Detected! Source: %{source_ip} | Probability: %{ai_probability}"
    #   }
    # }
  }

  # ── C. Debug (tắt ở production) ──────────────────────────────────────────
  # stdout { codec => rubydebug }
}
