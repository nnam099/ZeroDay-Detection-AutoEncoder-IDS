name: Dependency Audit

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install --progress-bar off pip-audit

      - name: Audit runtime dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Audit smoke dependencies
        run: python -m pip_audit -r requirements-smoke.txt

      - name: Audit developer dependencies
        run: python -m pip_audit -r requirements-dev.txt
