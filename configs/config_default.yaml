# IDS v15.0 — Default Config
# Tất cả giá trị có thể override qua CLI: --epochs 80

training:
  epochs: 100
  batch_size: 512
  lr: 3.0e-4
  patience: 20
  seed: 42
  num_workers: 2

model:
  hidden: 256
  ae_hidden: 128
  latent_dim: 32        # [NEW v15] VAE latent dimension

loss:
  lambda_con: 0.3
  focal_gamma: 2.0
  dos_weight: 8.0
  kl_weight: 0.001      # [NEW v15] VAE KL weight

detection:
  target_fpr: 0.05
  n_clusters: 25
  n_neighbors_knn: 20   # [NEW v15] KNN OOD detector

paths:
  data_dir: data/
  save_dir: checkpoints/
  plot_dir: plots/
