input {
  beats {
    port => 5044
  }

  # Thêm cửa phụ TCP để nhận log test
  tcp {
    port => 5000
  }

  udp {
    port => 5140
  }
}

filter {
  # 1. Bóc tách Syslog Header và Dữ liệu CSV cốt lõi
  grok {
    match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} (?:%{SYSLOGHOST:syslog_hostname} )?%{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:filter_data}" }
  }

  # 2. Xử lý chuyên biệt nếu đây là log từ tường lửa (filterlog)
  if [syslog_program] == "filterlog" {
    
    # Phân rã chuỗi CSV thành các trường dữ liệu riêng biệt
    csv {
      source => "filter_data"
      columns => [
        "rule_number", "sub_rule_number", "anchor", "tracker", "real_interface",
        "reason", "action", "direction", "ip_version", "tos", "ecn",
        "ttl", "id", "offset", "flags", "protocol_id", "protocol",
        "length", "src_ip", "dst_ip", "src_port", "dst_port", "data_length",
        "tcp_flags", "sequence_number", "ack_number", "tcp_window", "urg", "tcp_options"
      ]
    }

    # 3. Chuẩn hóa kiểu dữ liệu (Cực kỳ quan trọng cho AI)
    mutate {
      convert => {
        "length" => "integer"
        "src_port" => "integer"
        "dst_port" => "integer"
        "data_length" => "integer"
        "protocol_id" => "integer"
      }
      
      # Dọn dẹp rác: Xóa bỏ log thô ban đầu để tiết kiệm dung lượng lưu trữ
      remove_field => ["message", "filter_data", "syslog_timestamp", "syslog_hostname"]
    }
  }
}

output {
  # ĐƯỜNG 1: Đẩy vào Elasticsearch (Kho lưu trữ & Hiển thị Kibana)
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "pfsense-logs-%{+YYYY.MM.dd}"
  }

  # ĐƯỜNG 2: Đẩy luồng dữ liệu thời gian thực vào Kafka (Cho AI Model)
  if [syslog_program] == "filterlog" {
    kafka {
      bootstrap_servers => "kafka:9092"
      topic_id => "pfsense-logs-topic"
      codec => json
    }
  }
}
