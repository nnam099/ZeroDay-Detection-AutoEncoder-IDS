
services:
  # 1. KHO LƯU TRỮ VÀ TÌM KIẾM (ELK)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Tắt bảo mật để dễ dàng test local trong quá trình làm đồ án
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Giới hạn RAM để máy không bị treo
    ports:
      - "9200:9200"
    networks:
      - ddos_network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - ddos_network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    volumes:
      - ./elk-stack/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5140:5140/udp" # Cửa phụ để nhận log test qua UDP, log giả lập tấn công cho port ` 5140`
      - "5044:5044"
      - "5000:5000" # Cửa phụ để nhận log test, log giả lập tấn công cho port ` 5000`
    depends_on:
      - elasticsearch
      - kafka
    networks:
      - ddos_network

  # 2. HỆ THỐNG STREAMING & CACHING (KAFKA + REDIS)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ddos_network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ddos_network

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - ddos_network

  # 3. MÔ HÌNH DEEP LEARNING (PYTORCH)
  ai-model:
    build: ./ai-model
    container_name: ai_model
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - kafka
      - redis
    networks:
      - ddos_network

networks:
  ddos_network:
    driver: bridge