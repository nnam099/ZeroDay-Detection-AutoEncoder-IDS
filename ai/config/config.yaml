model:
  seq_length:   10      # Số requests mỗi cửa sổ sliding window
  latent_dim:   8       # Kích thước không gian tiềm ẩn (tăng từ 4 lên 8)
  feature_size: 7       # Số features: status, bytes, method_cat, url_length, hour, is_4xx, is_5xx
  nhead:        1       # Số attention heads (feature_size phải chia hết cho nhead)
  num_layers:   2       # Số lớp Transformer
  dropout:      0.1     # QUAN TRỌNG: phải > 0 để MC Dropout hoạt động
  model_path:   "models/transformer_vae_v1.pth"
  lr:           0.0005  # Learning rate cho optimizer Adam

detection:
  num_passes:   20      # Số lần forward pass cho MC Dropout
  # Ngưỡng sẽ được tính tự động bởi threshold_tuning.py sau khi train
  # Giá trị sau là ví dụ, cần cập nhật sau khi chạy threshold_tuning
  threshold_re: 0.05    # Ngưỡng Reconstruction Error
  threshold_u:  0.001   # Ngưỡng Uncertainty (MC Dropout variance)

monitor:
  interval:  60         # Quét log mới mỗi 60 giây
  log_path:  "/var/log/apache2/access.log"   # Đường dẫn Apache log trên server
  csv_temp:  "data/temp_processed.csv"       # File CSV tạm
  window_seconds: 60    # Kích thước cửa sổ thời gian cho IP aggregation (giây)

self_learning:
  queue_limit:  100     # Số mẫu Unknown Attack tối thiểu để kích hoạt tự học
  epochs:       20      # Số epoch fine-tuning
  beta:         0.5     # Trọng số KLD trong loss (thấp hơn khi self-learning)

elk:
  enabled:      false   # Đặt true khi đã cấu hình Elasticsearch
  host:         "localhost"
  port:         9200
  index:        "ddos-detection"
  # username: ""        # Bỏ comment nếu ES yêu cầu xác thực
  # password: ""