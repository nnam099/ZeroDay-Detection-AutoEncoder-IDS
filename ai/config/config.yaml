model:
  seq_length:   10      # Số flow trong 1 cửa sổ sliding window
  latent_dim:   4       # Kích thước không gian tiềm ẩn
  feature_size: 14      # 14 features từ CIC-IDS2017
  nhead:        2       # Số attention heads
  num_layers:   2       # Số lớp Transformer
  dropout:      0.15    # QUAN TRỌNG: > 0 để MC Dropout hoạt động
  model_path:   "models/transformer_vae_v1.pth"
  scaler_path:  "models/scaler.pkl"
  lr:           0.0003

detection:
  num_passes:   15      # Số lần forward pass cho MC Dropout
  threshold_re: 0.102945# 90th percentile BENIGN — từ kết quả train DTAE
  threshold_u:  0.0     # 95th percentile BENIGN uncertainty

monitor:
  interval:  60
  log_path:  "/var/log/apache2/access.log"
  csv_temp:  "data/temp_processed.csv"
  window_seconds: 60

self_learning:
  queue_limit:  100
  epochs:       20
  beta:         0.1

elk:
  enabled:      false
  host:         "localhost"
  port:         9200
  index:        "ddos-detection"