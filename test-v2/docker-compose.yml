version: '3.8'

services:
  # 1. Zookeeper (Quản lý Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ids_network

  # 2. Kafka (Message Broker siêu tốc)
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ids_network

  # 3. Elasticsearch (Database lưu Log)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.7.0
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=false # Tạm tắt bảo mật để Lab dễ kết nối
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Ép RAM để máy không bị treo
    ports:
      - "9200:9200"
    volumes:
      - ./elastic_data:/usr/share/elasticsearch/data
    networks:
      - ids_network

  # 4. Kibana (Giao diện hiển thị)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.7.0
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - ids_network

  # 5. Logstash (Đón log và chia đường)
  logstash:
    image: docker.elastic.co/logstash/logstash:8.7.0
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m" # Tối ưu RAM
    ports:
      - "5044:5044" # Cổng đón log TCP
    depends_on:
      - kafka
      - elasticsearch
    networks:
      - ids_network

  # 6. AI Module (Não bộ Python của bạn)
  ai_service:
    build: 
      context: ./ai_module
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - PFSENSE_IP=${PFSENSE_IP}
      - PFSENSE_USER=${PFSENSE_USER}
      - PFSENSE_PASS=${PFSENSE_PASS}
    depends_on:
      - kafka
    networks:
      - ids_network

networks:
  ids_network:
    driver: bridge